apiVersion: apps/v1
kind: Deployment
metadata:
  name: endpoints
  labels:
    app: endpoints
spec:
  replicas: 3
  selector:
    matchLabels:
      app: endpoints
  template:
    metadata:
      labels:
        app: endpoints
    spec:
      containers:
        - name: endpoints
          # Reuses the image built by partone/scripts/startup.sh.
          # PROJECT_NAME is substituted at apply time by scripts/deploy.sh.
          image: gcr.io/PROJECT_NAME/partone-container:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              port: 8080
              path: /readiness
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 1
            failureThreshold: 1
            successThreshold: 1
          livenessProbe:
            httpGet:
              port: 8080
              path: /healthcheck
              scheme: HTTP
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          env:
            - name: NODE_ENV
              value: production
