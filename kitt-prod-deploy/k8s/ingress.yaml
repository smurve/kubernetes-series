apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kitt-ingress
  annotations:
    # GCE = global external Application (HTTP/S) Load Balancer
    kubernetes.io/ingress.class: "gce"
    # Attach the pre-reserved global static IP (kitt-ingress).
    kubernetes.io/ingress.global-static-ip-name: "kitt-ingress"
    # Google-managed SSL certificate(s) to serve.
    networking.gke.io/managed-certificates: "kitt-cert"
    # Redirect HTTP -> HTTPS at the LB frontend.
    networking.gke.io/v1beta1.FrontendConfig: "http-to-https"
spec:
  # Fallback backend for any request that doesn't match a rule below.
  # Keeps traffic from landing on the (broken-in-Autopilot) default-http-backend.
  defaultBackend:
    service:
      name: endpoints
      port:
        number: 80
  rules:
    - host: kitt.smurve.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: endpoints
                port:
                  number: 80
